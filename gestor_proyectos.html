<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Proyectos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EEE8;
    --border: #E2DDD5;
    --border2: #CBC5BB;
    --text: #1A1917;
    --text2: #6B6660;
    --text3: #9E9990;
    --accent: #2B5CE6;
    --accent-bg: #EEF2FD;
    --accent-text: #1A3A9A;
    --green: #1A7A4A;
    --green-bg: #E8F5EE;
    --amber: #92580A;
    --amber-bg: #FEF3E2;
    --red: #C0392B;
    --red-bg: #FDEEEC;
    --purple: #6B3FA0;
    --purple-bg: #F2ECFA;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* LAYOUT */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 0;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 10;
  }

  .sidebar-logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .logo-mark {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .sidebar-logo .logo-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 1px;
    font-family: 'DM Mono', monospace;
  }

  .sidebar-nav { padding: 12px 10px; flex: 1; overflow-y: auto; }
  .nav-section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 10px 4px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text2);
    transition: all 0.12s;
    margin-bottom: 1px;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
  .nav-item .nav-icon { font-size: 16px; flex-shrink: 0; }
  .nav-item .nav-count {
    margin-left: auto;
    font-size: 11px;
    background: var(--surface2);
    color: var(--text3);
    padding: 1px 6px;
    border-radius: 100px;
    font-family: 'DM Mono', monospace;
  }
  .nav-item.active .nav-count { background: rgba(43,92,230,0.12); color: var(--accent); }

  .sidebar-footer {
    padding: 12px 10px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
  }
  .sidebar-action {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    transition: all 0.12s;
    border: none; background: none; width: 100%; text-align: left;
  }
  .sidebar-action:hover { background: var(--surface2); color: var(--text); }

  .main { margin-left: 240px; flex: 1; padding: 32px 40px; max-width: calc(100% - 240px); }

  .page-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 28px;
  }
  .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .page-subtitle { font-size: 13px; color: var(--text3); margin-top: 2px; }

  /* STATS */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 600; letter-spacing: -0.03em; color: var(--text); font-family: 'DM Mono', monospace; }
  .stat-desc { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* PROJECTS */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--border));
    transition: opacity 0.15s;
  }
  .project-card:hover { border-color: var(--border2); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .project-card.obra { --card-accent: var(--accent); }
  .project-card.personal { --card-accent: var(--purple); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .card-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; flex: 1; padding-right: 8px; }
  .card-desc { font-size: 13px; color: var(--text2); margin-bottom: 14px; line-height: 1.5; }

  .card-footer { display: flex; align-items: center; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

  .badge {
    font-size: 11px; font-weight: 500;
    padding: 3px 8px;
    border-radius: 100px;
  }
  .badge-obra { background: var(--accent-bg); color: var(--accent-text); }
  .badge-personal { background: var(--purple-bg); color: var(--purple); }
  .badge-active { background: var(--green-bg); color: var(--green); }
  .badge-paused { background: var(--amber-bg); color: var(--amber); }
  .badge-done { background: var(--surface2); color: var(--text3); }

  .card-tasks-info {
    font-size: 12px; color: var(--text3);
    margin-left: auto;
    font-family: 'DM Mono', monospace;
  }

  .progress-wrap { margin-top: 10px; }
  .progress-bar {
    height: 4px; background: var(--surface2);
    border-radius: 100px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 100px;
    background: var(--accent);
    transition: width 0.4s ease;
  }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text3);
    margin-bottom: 4px;
    font-family: 'DM Mono', monospace;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border-radius: var(--radius);
    font-size: 13px; font-weight: 500;
    cursor: pointer; border: none;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.12s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #2251D4; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface2); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid transparent; }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid transparent; }
  .btn-danger:hover { background: #FBDBD8; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { padding: 7px; border-radius: 8px; }

  /* PROJECT DETAIL VIEW */
  .detail-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
  }
  .detail-back {
    display: flex; align-items: center; gap: 4px;
    font-size: 13px; color: var(--text2);
    cursor: pointer; padding: 6px 10px;
    border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface);
    transition: all 0.12s;
  }
  .detail-back:hover { background: var(--surface2); color: var(--text); }

  .detail-title-block { flex: 1; }
  .detail-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .detail-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }

  .detail-body { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }

  .tasks-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .tasks-panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .tasks-panel-title { font-size: 13px; font-weight: 600; color: var(--text); }

  .task-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: var(--bg); }

  .task-checkbox {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    cursor: pointer; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    background: transparent;
  }
  .task-checkbox.done { background: var(--accent); border-color: var(--accent); }
  .task-checkbox.done::after { content: '✓'; font-size: 10px; color: white; font-weight: 600; }

  .task-content { flex: 1; min-width: 0; }
  .task-name { font-size: 14px; color: var(--text); line-height: 1.4; }
  .task-name.done { text-decoration: line-through; color: var(--text3); }
  .task-meta-row { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
  .priority-chip {
    font-size: 11px; padding: 1px 7px; border-radius: 100px; font-weight: 500;
  }
  .priority-alta { background: var(--red-bg); color: var(--red); }
  .priority-media { background: var(--amber-bg); color: var(--amber); }
  .priority-baja { background: var(--green-bg); color: var(--green); }
  .task-date { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .task-assignee { font-size: 11px; color: var(--text3); }

  .task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.12s; }
  .task-item:hover .task-actions { opacity: 1; }
  .task-del-btn {
    width: 24px; height: 24px; border-radius: 6px;
    border: none; background: transparent; cursor: pointer;
    color: var(--text3); font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .task-del-btn:hover { background: var(--red-bg); color: var(--red); }

  .info-panel {
    display: flex; flex-direction: column; gap: 14px;
  }
  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
  }
  .info-card-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 13px; }
  .info-row-label { color: var(--text2); }
  .info-row-val { font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; }

  .notes-area {
    width: 100%; min-height: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
  }
  .notes-area:focus { border-color: var(--border2); }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(10,8,6,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 24px;
    width: 100%; max-width: 440px;
    box-shadow: var(--shadow-md);
    animation: modal-in 0.15s ease;
  }
  @keyframes modal-in { from { transform: scale(0.97) translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 18px; letter-spacing: -0.01em; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    padding: 8px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.12s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--border2); background: var(--surface); }
  .form-textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .empty-desc { font-size: 13px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: white;
    padding: 10px 18px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500;
    z-index: 999; pointer-events: none;
    animation: toast-in 0.2s ease;
  }
  @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%); } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .sidebar { width: 200px; }
    .main { margin-left: 200px; padding: 20px 24px; max-width: calc(100% - 200px); }
    .detail-body { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .main { margin-left: 0; max-width: 100%; padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .projects-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">Proyectos</div>
      <div class="logo-sub">gestor personal</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Vistas</div>
      <div class="nav-item active" onclick="setView('all')" id="nav-all">
        <span class="nav-icon">⊞</span> Todos
        <span class="nav-count" id="count-all">0</span>
      </div>
      <div class="nav-item" onclick="setView('obra')" id="nav-obra">
        <span class="nav-icon">🏗</span> Obras
        <span class="nav-count" id="count-obra">0</span>
      </div>
      <div class="nav-item" onclick="setView('personal')" id="nav-personal">
        <span class="nav-icon">👤</span> Personal
        <span class="nav-count" id="count-personal">0</span>
      </div>
      <div class="nav-section-label" style="margin-top:12px;">Estado</div>
      <div class="nav-item" onclick="setView('active')" id="nav-active">
        <span class="nav-icon">▶</span> Activos
        <span class="nav-count" id="count-active">0</span>
      </div>
      <div class="nav-item" onclick="setView('paused')" id="nav-paused">
        <span class="nav-icon">⏸</span> Pausados
        <span class="nav-count" id="count-paused">0</span>
      </div>
      <div class="nav-item" onclick="setView('done')" id="nav-done">
        <span class="nav-icon">✓</span> Finalizados
        <span class="nav-count" id="count-done">0</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-action" onclick="exportData()">
        <span>⬇</span> Exportar backup
      </button>
      <button class="sidebar-action" onclick="triggerImport()">
        <span>⬆</span> Importar backup
      </button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main-content">
    <!-- rendered by JS -->
  </main>
</div>

<!-- MODALS -->
<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'gestor_proyectos_v1';

let state = {
  view: 'all',
  selectedProject: null,
  projects: [
    {
      id: uid(), name: 'Reforma casa Palermo', type: 'obra', status: 'active',
      desc: 'Remodelación cocina y baños. Contratistas definidos.',
      notes: '',
      createdAt: today(),
      tasks: [
        { id: uid(), name: 'Confirmar planos con arquitecto', done: false, priority: 'alta', date: '05/06', assignee: '' },
        { id: uid(), name: 'Pedir presupuesto cerámicos', done: false, priority: 'alta', date: '08/06', assignee: '' },
        { id: uid(), name: 'Contratar electricista', done: true, priority: 'media', date: '01/06', assignee: '' },
      ]
    },
    {
      id: uid(), name: 'Edificio Corrientes 1420', type: 'obra', status: 'active',
      desc: 'Obra nueva PH 4to piso. En estructura.',
      notes: '',
      createdAt: today(),
      tasks: [
        { id: uid(), name: 'Revisión de columnas con ingeniero', done: false, priority: 'alta', date: '10/06', assignee: '' },
        { id: uid(), name: 'Comprar hierro para losa', done: false, priority: 'media', date: '12/06', assignee: '' },
        { id: uid(), name: 'Pago cuota contratista junio', done: false, priority: 'alta', date: '06/06', assignee: '' },
      ]
    },
    {
      id: uid(), name: 'Finanzas personales', type: 'personal', status: 'active',
      desc: 'Reorganizar inversiones y presupuesto mensual.',
      notes: '',
      createdAt: today(),
      tasks: [
        { id: uid(), name: 'Revisar opciones de plazo fijo', done: true, priority: 'media', date: '01/06', assignee: '' },
        { id: uid(), name: 'Reunión con contador', done: false, priority: 'alta', date: '15/06', assignee: '' },
      ]
    },
    {
      id: uid(), name: 'Viaje julio', type: 'personal', status: 'paused',
      desc: 'Organizar vacaciones de invierno con familia.',
      notes: '',
      createdAt: today(),
      tasks: [
        { id: uid(), name: 'Comparar destinos', done: true, priority: 'baja', date: '30/05', assignee: '' },
        { id: uid(), name: 'Reservar alojamiento', done: false, priority: 'media', date: '20/06', assignee: '' },
      ]
    },
  ]
};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function today() { return new Date().toLocaleDateString('es-AR'); }
function progress(tasks) {
  if (!tasks.length) return 0;
  return Math.round(tasks.filter(t => t.done).length / tasks.length * 100);
}

// ─── PERSISTENCE ─────────────────────────────────────────────────────────────
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state = { ...state, ...saved, view: 'all', selectedProject: null };
    }
  } catch(e) {}
}

function exportData() {
  const data = JSON.stringify(state.projects, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  a.download = `backup_proyectos_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup exportado ✓');
}
function triggerImport() { document.getElementById('import-input').click(); }
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        state.projects = data;
        save(); render();
        toast('Backup importado ✓');
      } else { toast('Archivo inválido'); }
    } catch { toast('Error al importar'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function setView(v) {
  state.view = v;
  state.selectedProject = null;
  render();
}

function getFiltered() {
  let ps = state.projects;
  if (state.view === 'obra') ps = ps.filter(p => p.type === 'obra');
  else if (state.view === 'personal') ps = ps.filter(p => p.type === 'personal');
  else if (state.view === 'active') ps = ps.filter(p => p.status === 'active');
  else if (state.view === 'paused') ps = ps.filter(p => p.status === 'paused');
  else if (state.view === 'done') ps = ps.filter(p => p.status === 'done');
  return ps;
}

function updateCounts() {
  const all = state.projects;
  document.getElementById('count-all').textContent = all.length;
  document.getElementById('count-obra').textContent = all.filter(p=>p.type==='obra').length;
  document.getElementById('count-personal').textContent = all.filter(p=>p.type==='personal').length;
  document.getElementById('count-active').textContent = all.filter(p=>p.status==='active').length;
  document.getElementById('count-paused').textContent = all.filter(p=>p.status==='paused').length;
  document.getElementById('count-done').textContent = all.filter(p=>p.status==='done').length;
  ['all','obra','personal','active','paused','done'].forEach(v => {
    document.getElementById('nav-'+v).classList.toggle('active', state.view === v && !state.selectedProject);
  });
}

function render() {
  save();
  updateCounts();
  const main = document.getElementById('main-content');

  if (state.selectedProject) {
    renderDetail(main);
  } else {
    renderList(main);
  }
}

function renderList(main) {
  const ps = getFiltered();
  const allTasks = state.projects.flatMap(p => p.tasks);
  const pending = allTasks.filter(t => !t.done).length;
  const done = allTasks.filter(t => t.done).length;
  const activeProjs = state.projects.filter(p => p.status === 'active').length;

  const viewLabels = { all: 'Todos los proyectos', obra: 'Obras y trabajos', personal: 'Proyectos personales', active: 'Proyectos activos', paused: 'Proyectos pausados', done: 'Proyectos finalizados' };

  main.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">${viewLabels[state.view]}</div>
        <div class="page-subtitle">${new Date().toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</div>
      </div>
      <button class="btn btn-primary" onclick="openNewProject()">+ Nuevo proyecto</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Proyectos activos</div>
        <div class="stat-value">${activeProjs}</div>
        <div class="stat-desc">de ${state.projects.length} total</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tareas pendientes</div>
        <div class="stat-value">${pending}</div>
        <div class="stat-desc">sin completar</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completadas</div>
        <div class="stat-value">${done}</div>
        <div class="stat-desc">de ${allTasks.length} tareas</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Progreso global</div>
        <div class="stat-value">${allTasks.length ? Math.round(done/allTasks.length*100) : 0}%</div>
        <div class="stat-desc">completado</div>
      </div>
    </div>

    <div class="projects-grid" id="proj-grid">
      ${ps.length ? ps.map(p => renderProjectCard(p)).join('') : `
        <div class="empty" style="grid-column:1/-1">
          <div class="empty-icon">📁</div>
          <div class="empty-title">Sin proyectos</div>
          <div class="empty-desc">Creá el primer proyecto con el botón de arriba</div>
        </div>
      `}
    </div>
  `;
}

function renderProjectCard(p) {
  const prog = progress(p.tasks);
  const pending = p.tasks.filter(t => !t.done).length;
  const statusLabel = { active: 'Activo', paused: 'Pausado', done: 'Finalizado' }[p.status];
  return `
    <div class="project-card ${p.type}" onclick="selectProject('${p.id}')">
      <div class="card-top">
        <div class="card-name">${p.name}</div>
        <span class="badge badge-${p.type}">${p.type === 'obra' ? 'Obra' : 'Personal'}</span>
      </div>
      <div class="card-desc">${p.desc || '<span style="color:var(--text3);font-style:italic">Sin descripción</span>'}</div>
      <div class="card-footer">
        <span class="badge badge-${p.status}">${statusLabel}</span>
        <span class="card-tasks-info">${pending} pendiente${pending !== 1 ? 's' : ''}</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>${prog}% completado</span>
          <span>${p.tasks.filter(t=>t.done).length}/${p.tasks.length}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
      </div>
    </div>
  `;
}

function renderDetail(main) {
  const p = state.projects.find(x => x.id === state.selectedProject);
  if (!p) { state.selectedProject = null; renderList(main); return; }
  const prog = progress(p.tasks);
  const statusLabel = { active: 'Activo', paused: 'Pausado', done: 'Finalizado' }[p.status];

  main.innerHTML = `
    <div class="detail-header">
      <div class="detail-back" onclick="goBack()">← Proyectos</div>
      <div class="detail-title-block">
        <div class="detail-title">${p.name}</div>
        <div class="detail-meta">
          <span class="badge badge-${p.type}">${p.type === 'obra' ? 'Obra' : 'Personal'}</span>
          <span class="badge badge-${p.status}">${statusLabel}</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary btn-sm" onclick="openEditProject('${p.id}')">✏ Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProject('${p.id}')">✕ Eliminar</button>
      </div>
    </div>

    ${p.desc ? `<div style="font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6;">${p.desc}</div>` : ''}

    <div class="detail-body">
      <div>
        <div class="tasks-panel">
          <div class="tasks-panel-header">
            <span class="tasks-panel-title">Tareas · ${prog}% completado</span>
            <button class="btn btn-primary btn-sm" onclick="openNewTask('${p.id}')">+ Agregar tarea</button>
          </div>
          <div class="progress-bar" style="border-radius:0;"><div class="progress-fill" style="width:${prog}%"></div></div>
          ${p.tasks.length ? p.tasks.map(t => renderTask(p.id, t)).join('') : `
            <div class="empty">
              <div class="empty-icon">✓</div>
              <div class="empty-title">Sin tareas</div>
              <div class="empty-desc">Agregá la primera tarea del proyecto</div>
            </div>
          `}
        </div>
      </div>

      <div class="info-panel">
        <div class="info-card">
          <div class="info-card-title">Resumen</div>
          <div class="info-row">
            <span class="info-row-label">Total tareas</span>
            <span class="info-row-val">${p.tasks.length}</span>
          </div>
          <div class="info-row">
            <span class="info-row-label">Completadas</span>
            <span class="info-row-val">${p.tasks.filter(t=>t.done).length}</span>
          </div>
          <div class="info-row">
            <span class="info-row-label">Pendientes</span>
            <span class="info-row-val">${p.tasks.filter(t=>!t.done).length}</span>
          </div>
          <div class="info-row">
            <span class="info-row-label">Alta prioridad</span>
            <span class="info-row-val">${p.tasks.filter(t=>!t.done&&t.priority==='alta').length}</span>
          </div>
          <div class="info-row">
            <span class="info-row-label">Creado</span>
            <span class="info-row-val">${p.createdAt}</span>
          </div>
        </div>

        <div class="info-card">
          <div class="info-card-title">Notas</div>
          <textarea class="notes-area" placeholder="Notas, comentarios, recordatorios..." oninput="saveNotes('${p.id}', this.value)">${p.notes || ''}</textarea>
        </div>

        <div class="info-card">
          <div class="info-card-title">Estado</div>
          <select class="form-select" onchange="changeStatus('${p.id}', this.value)">
            <option value="active" ${p.status==='active'?'selected':''}>Activo</option>
            <option value="paused" ${p.status==='paused'?'selected':''}>Pausado</option>
            <option value="done" ${p.status==='done'?'selected':''}>Finalizado</option>
          </select>
        </div>
      </div>
    </div>
  `;
}

function renderTask(projId, t) {
  return `
    <div class="task-item" id="task-${t.id}">
      <div class="task-checkbox ${t.done ? 'done' : ''}" onclick="toggleTask('${projId}','${t.id}')"></div>
      <div class="task-content">
        <div class="task-name ${t.done ? 'done' : ''}">${t.name}</div>
        <div class="task-meta-row">
          <span class="priority-chip priority-${t.priority}">${t.priority.charAt(0).toUpperCase()+t.priority.slice(1)}</span>
          ${t.date ? `<span class="task-date">📅 ${t.date}</span>` : ''}
          ${t.assignee ? `<span class="task-assignee">👤 ${t.assignee}</span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="task-del-btn" onclick="deleteTask('${projId}','${t.id}')" title="Eliminar">✕</button>
      </div>
    </div>
  `;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function selectProject(id) { state.selectedProject = id; render(); }
function goBack() { state.selectedProject = null; render(); }

function toggleTask(projId, taskId) {
  const p = state.projects.find(x => x.id === projId);
  const t = p && p.tasks.find(x => x.id === taskId);
  if (t) { t.done = !t.done; render(); }
}

function deleteTask(projId, taskId) {
  const p = state.projects.find(x => x.id === projId);
  if (p) { p.tasks = p.tasks.filter(t => t.id !== taskId); render(); toast('Tarea eliminada'); }
}

function saveNotes(projId, val) {
  const p = state.projects.find(x => x.id === projId);
  if (p) { p.notes = val; save(); }
}

function changeStatus(projId, val) {
  const p = state.projects.find(x => x.id === projId);
  if (p) { p.status = val; render(); toast('Estado actualizado'); }
}

function deleteProject(id) {
  if (!confirm('¿Eliminar este proyecto y todas sus tareas?')) return;
  state.projects = state.projects.filter(p => p.id !== id);
  state.selectedProject = null;
  render();
  toast('Proyecto eliminado');
}

// ─── MODALS ──────────────────────────────────────────────────────────────────
function modal(html) {
  const el = document.createElement('div');
  el.className = 'modal-backdrop';
  el.id = 'active-modal';
  el.innerHTML = `<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
  el.onclick = closeModal;
  document.getElementById('modal-container').appendChild(el);
}
function closeModal() {
  const m = document.getElementById('active-modal');
  if (m) m.remove();
}

function openNewProject() {
  modal(`
    <div class="modal-title">Nuevo proyecto</div>
    <div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="f-name" placeholder="Ej: Obra Libertador 2460" autofocus></div>
    <div class="form-group"><label class="form-label">Descripción</label><textarea class="form-textarea" id="f-desc" placeholder="Detalle del proyecto..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Tipo</label>
        <select class="form-select" id="f-type">
          <option value="obra">Obra / Trabajo</option>
          <option value="personal">Personal</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Estado</label>
        <select class="form-select" id="f-status">
          <option value="active">Activo</option>
          <option value="paused">Pausado</option>
          <option value="done">Finalizado</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewProject()">Guardar proyecto</button>
    </div>
  `);
}

function saveNewProject() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  state.projects.unshift({
    id: uid(),
    name,
    desc: document.getElementById('f-desc').value.trim(),
    type: document.getElementById('f-type').value,
    status: document.getElementById('f-status').value,
    notes: '',
    createdAt: today(),
    tasks: []
  });
  closeModal(); render(); toast('Proyecto creado ✓');
}

function openEditProject(id) {
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  modal(`
    <div class="modal-title">Editar proyecto</div>
    <div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="f-name" value="${p.name}" autofocus></div>
    <div class="form-group"><label class="form-label">Descripción</label><textarea class="form-textarea" id="f-desc">${p.desc || ''}</textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Tipo</label>
        <select class="form-select" id="f-type">
          <option value="obra" ${p.type==='obra'?'selected':''}>Obra / Trabajo</option>
          <option value="personal" ${p.type==='personal'?'selected':''}>Personal</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Estado</label>
        <select class="form-select" id="f-status">
          <option value="active" ${p.status==='active'?'selected':''}>Activo</option>
          <option value="paused" ${p.status==='paused'?'selected':''}>Pausado</option>
          <option value="done" ${p.status==='done'?'selected':''}>Finalizado</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEditProject('${id}')">Guardar cambios</button>
    </div>
  `);
}

function saveEditProject(id) {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  const p = state.projects.find(x => x.id === id);
  if (p) {
    p.name = name;
    p.desc = document.getElementById('f-desc').value.trim();
    p.type = document.getElementById('f-type').value;
    p.status = document.getElementById('f-status').value;
  }
  closeModal(); render(); toast('Proyecto actualizado ✓');
}

function openNewTask(projId) {
  modal(`
    <div class="modal-title">Nueva tarea</div>
    <div class="form-group"><label class="form-label">Descripción *</label><input class="form-input" id="t-name" placeholder="¿Qué hay que hacer?" autofocus></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Prioridad</label>
        <select class="form-select" id="t-priority">
          <option value="alta">Alta</option>
          <option value="media" selected>Media</option>
          <option value="baja">Baja</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Fecha límite</label>
        <input class="form-input" id="t-date" placeholder="dd/mm o dd/mm/aaaa">
      </div>
    </div>
    <div class="form-group"><label class="form-label">Responsable</label>
      <input class="form-input" id="t-assignee" placeholder="Ej: Ana, yo, arquitecto...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewTask('${projId}')">Agregar tarea</button>
    </div>
  `);
}

function saveNewTask(projId) {
  const name = document.getElementById('t-name').value.trim();
  if (!name) { document.getElementById('t-name').focus(); return; }
  const p = state.projects.find(x => x.id === projId);
  if (p) {
    p.tasks.push({
      id: uid(),
      name,
      done: false,
      priority: document.getElementById('t-priority').value,
      date: document.getElementById('t-date').value.trim(),
      assignee: document.getElementById('t-assignee').value.trim(),
    });
  }
  closeModal(); render(); toast('Tarea agregada ✓');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
